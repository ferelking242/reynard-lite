name: Build Reynard Lite

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-26

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: false

    - name: Select Xcode 26
      run: |
        XCODE=$(find /Applications -maxdepth 1 -name 'Xcode*.app' | sort -V | tail -1)
        echo "Using Xcode: $XCODE"
        sudo xcode-select -s "$XCODE/Contents/Developer"
        xcodebuild -version

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Setup Rust (stable + aarch64-apple-ios)
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: aarch64-apple-ios

    - name: Cache Homebrew packages
      id: brew-cache
      uses: actions/cache@v4
      with:
        path: |
          /opt/homebrew/Cellar/ldid
          /opt/homebrew/Cellar/libplist
          /opt/homebrew/Cellar/lld
          /opt/homebrew/Cellar/nasm
          /opt/homebrew/Cellar/yasm
          /opt/homebrew/Cellar/autoconf
        key: brew-tools-${{ runner.os }}-${{ runner.arch }}-v3

    - name: Install build tools
      run: |
        if [ "${{ steps.brew-cache.outputs.cache-hit }}" = "true" ]; then
          brew link --overwrite ldid libplist lld nasm yasm autoconf 2>/dev/null \
            || brew install ldid libplist lld nasm yasm autoconf
        else
          brew install ldid libplist lld nasm yasm autoconf
        fi
        which lld nasm
        ldid 2>&1 | head -1 || true

    - name: Cache cbindgen binary
      id: cbindgen-cache
      uses: actions/cache@v4
      with:
        path: ~/.cargo/bin/cbindgen
        key: cbindgen-${{ runner.os }}-${{ runner.arch }}-v1

    - name: Install cbindgen and other Cargo tools
      if: steps.cbindgen-cache.outputs.cache-hit != 'true'
      run: cargo install cbindgen

    - name: Read Gecko release tag
      id: gecko-tag
      run: echo "tag=$(cat engine/release.txt | tr -d '[:space:]')" >> "$GITHUB_OUTPUT"

    - name: Cache Gecko dist
      id: gecko-cache
      uses: actions/cache/restore@v4
      with:
        path: engine/firefox/obj-aarch64-apple-ios/dist
        key: gecko-dist-${{ steps.gecko-tag.outputs.tag }}-${{ hashFiles('patches/**') }}

    - name: Cache Cargo registry
      uses: actions/cache@v4
      with:
        save-always: true
        path: |
          ~/.cargo/registry
          ~/.cargo/git
        key: cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: cargo-

    - name: Clone Firefox source
      run: |
        RELEASE_TAG="${{ steps.gecko-tag.outputs.tag }}"
        echo "Cloning Firefox at tag $RELEASE_TAG (shallow)..."
        # engine/firefox may already exist here (but be a non-git directory
        # tree) when the Gecko dist cache was restored, since that cache's
        # path is engine/firefox/obj-aarch64-apple-ios/dist and restoring it
        # creates the parent directories first. A plain `git clone` refuses
        # to clone into a pre-existing non-empty directory, so init/fetch
        # into it in place instead, which works whether or not it already
        # has content.
        mkdir -p engine/firefox
        if [ ! -d engine/firefox/.git ]; then
          git -C engine/firefox init -q
          git -C engine/firefox remote add origin https://github.com/mozilla-firefox/firefox
        fi
        git -C engine/firefox fetch --depth 1 origin "$RELEASE_TAG"
        git -C engine/firefox checkout --force FETCH_HEAD
      # NOTE: this step always runs, even when the Gecko dist cache hits.
      # dist/bin/res/*.css (html.css, forms.css, ua.css, etc.) and several
      # other packaged resources are symlinks into this source tree, not
      # real files. browser/Scripts/AddGecko.sh copies them into
      # GeckoView.framework with `rsync -L`, which dereferences symlinks by
      # reading the target path. If engine/firefox isn't checked out (as
      # happened whenever the dist cache was warm), those symlinks are
      # dangling, rsync silently drops them (non-fatal partial transfer),
      # and the shipped app has an EMPTY res/ directory. At startup,
      # GlobalStyleSheetCache::BuiltInSheet() then fails to load required
      # built-in stylesheets and calls ErrorLoadingSheet(eCrash), which hits
      # the OOM/nested-crash bug in ErrorLoadingSheet's own crash-reason
      # formatting (see GlobalStyleSheetCache.cpp.patch) and the app SIGSEGVs
      # in mozilla::PrintfTarget::vprint at startup instead of ever
      # rendering. Cloning is comparatively cheap; only the expensive
      # `./mach build` step below is skipped on a cache hit.

    - name: Apply Gecko patches
      run: |
        find patches -name "*.patch" | sort | while read -r patch; do
          echo "Applying $patch..."
          git -C engine/firefox apply --3way --whitespace=nowarn "../../$patch"
        done
        echo "All patches applied."

    - name: Build Gecko engine
      if: steps.gecko-cache.outputs.cache-hit != 'true'
      run: ./tools/development/build-gecko.sh

    - name: Save Gecko dist cache
      if: steps.gecko-cache.outputs.cache-hit != 'true'
      uses: actions/cache/save@v4
      with:
        path: engine/firefox/obj-aarch64-apple-ios/dist
        key: gecko-dist-${{ steps.gecko-tag.outputs.tag }}-${{ hashFiles('patches/**') }}

    - name: Cache libidevice_ffi
      id: libidevice-cache
      uses: actions/cache@v4
      with:
        path: browser/Reynard/JIT/RPPairing/libidevice_ffi.a
        key: libidevice-ffi-${{ hashFiles('**/Cargo.lock') }}-v1

    - name: Clone idevice
      if: steps.libidevice-cache.outputs.cache-hit != 'true'
      run: |
        if [ ! -d support/idevice ]; then
          git clone --recursive https://github.com/jkcoxson/idevice support/idevice
        fi

    - name: Build libidevice_ffi
      if: steps.libidevice-cache.outputs.cache-hit != 'true'
      run: |
        REPO_ROOT="$(pwd)"
        FFI_DIR="support/idevice/ffi"
        OUTPUT_LIB="$REPO_ROOT/browser/Reynard/JIT/RPPairing/libidevice_ffi.a"
        TARGET_DIR="$REPO_ROOT/support/idevice/target"
        RUST_TARGET="aarch64-apple-ios"
        export IPHONEOS_DEPLOYMENT_TARGET="13.0"
        export RUSTFLAGS="-C link-arg=-miphoneos-version-min=13.0"
        export TARGET_DIR
        mkdir -p "$(dirname "$OUTPUT_LIB")"
        cd "$FFI_DIR"
        cargo build --release --target "$RUST_TARGET" --no-default-features --features full,ring
        cp "$TARGET_DIR/$RUST_TARGET/release/libidevice_ffi.a" "$OUTPUT_LIB"

    - name: Build Xcode archive
      run: ./tools/release/build-app.sh

    - name: Create IPA
      run: ./tools/release/create-ipa.sh

    - name: Upload Normal IPA
      uses: actions/upload-artifact@v4
      with:
        name: Reynard-Normal
        path: dist/Reynard.ipa
        if-no-files-found: error

    - name: Upload TrollStore IPA
      uses: actions/upload-artifact@v4
      with:
        name: Reynard-TrollStore
        path: dist/Reynard-TrollStore.tipa
        if-no-files-found: error

    - name: Upload Jailbroken IPA
      uses: actions/upload-artifact@v4
      with:
        name: Reynard-Jailbroken
        path: dist/Reynard-Jailbroken.ipa
        if-no-files-found: error

    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: |
          dist/Reynard.ipa
          dist/Reynard-TrollStore.tipa
          dist/Reynard-Jailbroken.ipa
        generate_release_notes: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
